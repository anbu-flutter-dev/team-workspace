name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: master
          flutter-version: 3.47.0-0.1.pre

      - name: Install dependencies
        run: flutter pub get

      # firebase_options.dart is gitignored (per-project, generated by
      # `flutterfire configure`) — the sample keeps analyze/test/build
      # able to resolve the import without real credentials.
      - name: Stub firebase_options.dart
        run: cp lib/firebase_options.sample.dart lib/firebase_options.dart

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug
